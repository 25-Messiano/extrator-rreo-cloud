services:
  - type: web
    name: extrator-rreo-cloud
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /_stcore/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_PATH
        value: data/database.db
      - key: GOOGLE_STORAGE_BUCKET
        value: maestro-rreo-arquivos
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
